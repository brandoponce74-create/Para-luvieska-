<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amor eterno ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        /* Texto superior con efecto de escritura */
        .texto-superior {
            width: 85%;
            margin-top: 30px;
            text-align: center;
            min-height: 100px;
            z-index: 10;
        }

        .texto-superior p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            color: #333;
            line-height: 1.3;
            text-shadow: 0 0 15px rgba(255,255,255,0.9);
        }

        /* CONTENEDOR DEL ÁRBOL MÁGICO */
        .tree-container {
            position: relative;
            width: 300px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Estilo de las ramas (SVG) */
        .branch {
            fill: none;
            stroke: #4e342e;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: growBranch 3s ease-out forwards;
        }

        @keyframes growBranch {
            to { stroke-dashoffset: 0; }
        }

        /* CORAZONES QUE RELLENAN LA COPA */
        .leaf-heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 16px;
            filter: drop-shadow(0 0 5px rgba(255, 77, 109, 0.6));
            opacity: 0;
            transform: scale(0);
            animation: popHeart 1s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards;
        }

        @keyframes popHeart {
            to { opacity: 1; transform: scale(1); }
        }

        /* Brillos estilo YouTube */
        .sparkle {
            position: absolute;
            color: #fff3b0;
            font-size: 10px;
            pointer-events: none;
            animation: floatSparkle 4s linear infinite;
        }

        @keyframes floatSparkle {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-150px) translateX(20px); opacity: 0; }
        }

        .nuestra-foto {
            width: 140px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: absolute;
            left: 5%;
            bottom: 12%;
            opacity: 0;
            transform: rotate(-5deg) translateY(20px);
            transition: all 1.2s ease-out;
        }

        .contador-meses {
            font-size: 3.5rem;
            color: #ff4d6d;
            font-weight: 800;
            margin-bottom: 30px;
            opacity: 0;
            transition: opacity 2s;
        }
    </style>
</head>
<body>

    <div class="texto-superior">
        <p id="typed-text"></p>
    </div>

    <div class="tree-container" id="tree-box">
        <svg viewBox="0 0 200 200" width="100%" height="100%">
            <path class="branch" d="M100,200 L100,140" style="stroke-width: 6;"/>
            <path class="branch" d="M100,150 Q70,130 50,90" style="animation-delay: 1s;"/>
            <path class="branch" d="M100,150 Q130,130 150,90" style="animation-delay: 1.2s;"/>
            <path class="branch" d="M100,130 Q100,80 100,40" style="animation-delay: 1.5s;"/>
            <path class="branch" d="M75,115 Q40,100 30,60" style="animation-delay: 2s;"/>
            <path class="branch" d="M125,115 Q160,100 170,60" style="animation-delay: 2.2s;"/>
            <path class="branch" d="M100,90 Q70,60 80,30" style="animation-delay: 2.5s;"/>
            <path class="branch" d="M100,90 Q130,60 120,30" style="animation-delay: 2.7s;"/>
        </svg>
        <div id="heart-layer"></div>
    </div>

    <img src="nuestra-foto.jpg" alt="Pareja" class="nuestra-foto" id="love-img">
    <div class="contador-meses" id="count-txt">19 meses</div>

    <script>
        const frase = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito te amo demasiado ❤️";
        let charIndex = 0;

        function typeWriter() {
            if (charIndex < frase.length) {
                document.getElementById("typed-text").innerHTML += frase.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 50);
            } else {
                document.getElementById('love-img').style.opacity = "1";
                document.getElementById('love-img').style.transform = "rotate(-5deg) translateY(0)";
                document.getElementById('count-txt').style.opacity = "1";
            }
        }

        // Genera 100 corazones en las puntas de las ramas
        function growHearts() {
            const layer = document.getElementById('heart-layer');
            const positions = [
                {x:100, y:40}, {x:50, y:90}, {x:150, y:90}, {x:30, y:60}, 
                {x:170, y:60}, {x:80, y:30}, {x:120, y:30}, {x:100, y:70}
            ];

            for(let i=0; i<80; i++) {
                const heart = document.createElement('div');
                heart.className = 'leaf-heart';
                heart.innerHTML = '❤️';
                
                // Distribución aleatoria alrededor de los puntos finales de las ramas
                const base = positions[Math.floor(Math.random() * positions.length)];
                const offsetX = (Math.random() * 80 - 40);
                const offsetY = (Math.random() * 80 - 40);
                
                heart.style.left = (base.x * 1.5 + offsetX) + 'px';
                heart.style.top = (base.y * 1.5 + offsetY) + 'px';
                heart.style.animationDelay = (3 + Math.random() * 2) + 's';
                
                layer.appendChild(heart);
            }
        }

        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.innerHTML = '✨';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.bottom = '20%';
            document.getElementById('tree-box').appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 4000);
        }

        window.onload = () => {
            typeWriter();
            growHearts();
            setInterval(createSparkle, 500);
        };
    </script>
</body>
</html>
