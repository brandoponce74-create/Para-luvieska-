<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amor ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        .texto-superior {
            width: 85%;
            margin-top: 30px;
            text-align: center;
            min-height: 100px;
            z-index: 10;
        }

        .texto-superior p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            color: #333;
            line-height: 1.3;
        }

        .seccion-media {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            position: relative;
        }

        .nuestra-foto {
            width: 140px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transform: scale(0.5);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* CONTENEDOR DEL ÁRBOL */
        .arbol-svg-container {
            width: 300px;
            height: 350px;
            position: relative;
        }

        .rama {
            fill: none;
            stroke: #5d4037;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: crecerRama 4s ease-out forwards;
        }

        @keyframes crecerRama {
            to { stroke-dashoffset: 0; }
        }

        /* HOJAS QUE RELLENAN EL ÁRBOL */
        .hoja-fija {
            position: absolute;
            color: #ff4d6d;
            font-size: 12px;
            opacity: 0;
            animation: aparecerHoja 2s ease-out forwards;
        }

        @keyframes aparecerHoja {
            to { opacity: 0.8; }
        }

        /* CORAZONES QUE CAEN */
        .corazon-caida {
            position: absolute;
            color: #ff758f;
            pointer-events: none;
            z-index: 1;
            animation: caer 6s linear forwards;
        }

        @keyframes caer {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(400px) rotate(360deg) translateX(var(--x)); opacity: 0; }
        }

        .contador-pie {
            font-size: 3rem;
            color: #ff4d6d;
            font-weight: 800;
            margin-bottom: 40px;
            opacity: 0;
            transition: opacity 2s;
        }
    </style>
</head>
<body>

    <div class="texto-superior">
        <p id="typed"></p>
    </div>

    <div class="seccion-media">
        <img src="nuestra-foto.jpg" alt="Amor" class="nuestra-foto" id="foto-amor">
        
        <div class="arbol-svg-container" id="arbol-box">
            <svg viewBox="0 0 200 200" width="100%" height="100%" id="arbol-svg">
                </svg>
            <div id="capa-hojas"></div>
            <div id="capa-caida"></div>
        </div>
    </div>

    <div class="contador-pie" id="meses-display">19 meses</div>

    <script>
        const texto = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito te amo demasiado y quiero cumplir muchos años más a tu lado mi niña hermosa ❤️";
        let charIndex = 0;

        function typeWriter() {
            if (charIndex < texto.length) {
                document.getElementById("typed").innerHTML += texto.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 50);
            } else {
                document.getElementById('foto-amor').style.opacity = "1";
                document.getElementById('foto-amor').style.transform = "scale(1) rotate(-5deg)";
                document.getElementById('meses-display').style.opacity = "1";
            }
        }

        // Función para crear muchas hojas de corazón fijas en el árbol
        function rellenarArbol() {
            const capaHojas = document.getElementById('capa-hojas');
            for (let i = 0; i < 150; i++) {
                const hoja = document.createElement('div');
                hoja.className = 'hoja-fija';
                hoja.innerHTML = '❤️';
                
                // Distribución en forma de copa de árbol
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 80;
                const x = 150 + Math.cos(angle) * radius;
                const y = 120 + Math.sin(angle) * (radius * 0.8);
                
                hoja.style.left = x + 'px';
                hoja.style.top = y + 'px';
                hoja.style.animationDelay = (Math.random() * 3 + 2) + 's';
                
                capaHojas.appendChild(hoja);
            }
        }

        function crearCorazonCaida() {
            const capaCaida = document.getElementById('capa-caida');
            const corazon = document.createElement('div');
            corazon.className = 'corazon-caida';
            corazon.innerHTML = '❤️';
            
            corazon.style.left = (Math.random() * 200 + 50) + 'px';
            corazon.style.top = '100px';
            corazon.style.setProperty('--x', (Math.random() * 120 - 60) + 'px');
            corazon.style.fontSize = (Math.random() * 10 + 10) + 'px';
            
            capaCaida.appendChild(corazon);
            setTimeout(() => corazon.remove(), 6000);
        }

        // Generar ramas densas en el SVG
        function dibujarRamas() {
            const svg = document.getElementById('arbol-svg');
            const ramas = [
                "M100,200 L100,150", // Tronco
                "M100,160 Q80,140 60,110", "M100,160 Q120,140 140,110", // Ramas principales
                "M80,135 Q60,120 45,95", "M120,135 Q140,120 155,95", // Ramas secundarias
                "M100,150 Q100,110 100,70", // Centro
                "M90,120 Q70,90 80,60", "M110,120 Q130,90 120,60" // Ramas superiores
            ];
            
            ramas.forEach((d, i) => {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", d);
                path.setAttribute("class", "rama");
                path.style.animationDelay = (i * 0.3) + "s";
                svg.appendChild(path);
            });
        }

        window.onload = () => {
            dibujarRamas();
            typeWriter();
            rellenarArbol();
            setTimeout(() => {
                setInterval(crearCorazonCaida, 500);
            }, 3000);
        };
    </script>
</body>
</html>
