<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Luvieska</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --pink-bg: #fce4ec; --heart-red: #ff4d6d; --text-color: #5d4037; }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--pink-bg); font-family: 'Quicksand', sans-serif; overflow: hidden; }
        .card { text-align: center; width: 95%; max-width: 500px; }
        #message-area { font-family: 'Dancing Script', cursive; font-size: 1.5rem; color: var(--text-color); min-height: 80px; margin-bottom: 20px; }
        
        /* Foto y Árbol Lado a Lado */
        .duo-container { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 30px; }
        
        .photo-side { 
            width: 140px; height: 180px; 
            background-image: url('nuestra-foto.jpg'); 
            background-size: cover; background-position: center;
            border-radius: 15px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .tree-side { 
            position: relative; width: 180px; height: 220px; 
            background-image: url('arbol-artístico.png'); /* Con tilde como tu archivo */
            background-size: contain; background-repeat: no-repeat; background-position: bottom;
        }

        .heart { position: absolute; color: var(--heart-red); font-size: 18px; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { transform: translateY(-180px) translateX(calc(var(--x) * 1px)) scale(1); opacity: 0.5; }
        }

        #timer { font-weight: bold; font-size: 2.5rem; color: var(--heart-red); }
    </style>
</head>
<body>
    <div class="card">
        <div id="message-area"></div>
        <div class="duo-container">
            <div class="photo-side"></div>
            <div class="tree-side" id="tree"></div>
        </div>
        <div id="timer">Calculando...</div>
    </div>

    <script>
        const startDate = new Date(2024, 7, 3);
        const text = "Luvieska, si pudiera elegir un lugar seguro, sería a tu lado. Cuanto más tiempo estoy contigo, más te amo...";
        let index = 0;

        function typeWriter() {
            if (index < text.length) {
                document.getElementById("message-area").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, 70);
            }
        }

        function updateTimer() {
            const now = new Date();
            let months = (now.getFullYear() - startDate.getFullYear()) * 12;
            months -= startDate.getMonth();
            months += now.getMonth();
            if (now.getDate() < startDate.getDate()) months--;
            document.getElementById('timer').innerHTML = `${months} meses`;
        }

        function createHeart() {
            const tree = document.getElementById('tree');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤';
            heart.style.setProperty('--x', (Math.random() - 0.5) * 150);
            heart.style.left = '50%';
            heart.style.bottom = '80px';
            const dur = Math.random() * 2 + 3;
            heart.style.animationDuration = dur + 's';
            tree.appendChild(heart);
            setTimeout(() => heart.remove(), dur * 1000);
        }

        typeWriter();
        updateTimer();
        setInterval(createHeart, 300);
    </script>
</body>
</html>
