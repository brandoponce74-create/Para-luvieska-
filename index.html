<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Aniversario</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Usamos tu imagen de flores como fondo */
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contenedor {
            position: relative;
            text-align: center;
        }

        /* Tu imagen del árbol */
        .arbol {
            width: 450px; /* Ajusta el tamaño según prefieras */
            position: relative;
            z-index: 2;
        }

        /* Tu foto de pareja */
        .nuestra-foto {
            width: 150px;
            border-radius: 50%;
            border: 5px solid white;
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
        }

        /* Estilo de los corazones animados */
        .corazon {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            user-select: none;
            z-index: 1;
            animation: flotar 4s linear infinite;
            opacity: 0;
        }

        @keyframes flotar {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-300px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="contenedor" id="escena">
        <img src="nuestra-foto.jpg" alt="Nosotros" class="nuestra-foto">
        <img src="arbol.png" alt="Árbol" class="arbol">
    </div>

    <script>
        function crearCorazon() {
            const escena = document.getElementById('escena');
            const corazon = document.createElement('div');
            corazon.classList.add('corazon');
            corazon.innerHTML = '❤️'; // Puedes usar una imagen pequeña si prefieres

            // Posición aleatoria dentro del área del árbol
            const x = Math.random() * 300 - 150; // Rango horizontal
            const y = Math.random() * 200 + 50;  // Rango vertical desde la base

            corazon.style.left = `calc(50% + ${x}px)`;
            corazon.style.top = `${y}px`;
            
            // Tamaño y velocidad aleatoria
            corazon.style.fontSize = Math.random() * 20 + 10 + 'px';
            corazon.style.animationDuration = Math.random() * 3 + 2 + 's';

            escena.appendChild(corazon);

            // Eliminar después de la animación para no saturar la memoria
            setTimeout(() => {
                corazon.remove();
            }, 4000);
        }

        // Crear un corazón cada 300 milisegundos
        setInterval(crearCorazon, 300);
    </script>
</body>
</html>
