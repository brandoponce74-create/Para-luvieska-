<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Aniversario ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: 'Quicksand', sans-serif;
            background-color: #000;
        }

        #boton-musica {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 182, 193, 0.9);
            border: none;
            border-radius: 50%;
            padding: 15px;
            cursor: pointer;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        .dedicatoria {
            background: rgba(255, 255, 255, 0.75);
            padding: 20px;
            margin-top: 30px;
            border-radius: 25px;
            width: 85%;
            max-width: 450px;
            text-align: center;
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .dedicatoria p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #333;
            margin: 0;
        }

        .contenido-central {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .arbol {
            width: 350px;
            z-index: 2;
        }

        .nuestra-foto {
            width: 160px;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            border: 6px solid white;
            position: absolute;
            left: 8%;
            bottom: 15%;
            transform: rotate(-6deg);
            z-index: 3;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .contador-texto {
            color: #ff4d6d;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 40px;
            z-index: 10;
        }

        .corazon {
            position: absolute;
            color: #ff758f;
            z-index: 1;
            animation: flotarCorazon 5s ease-in forwards;
            opacity: 0;
        }

        @keyframes flotarCorazon {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-500px) scale(1.4); opacity: 0; }
        }

        .estrella {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: brillar 3s infinite;
        }

        @keyframes brillar {
            0%, 100% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.8; transform: scale(1); }
        }
    </style>
</head>
<body>

    <button id="boton-musica" onclick="toggleMusica()">🎵</button>

    <audio id="miAudio" loop>
        <source src="https://files.catbox.moe/p9oxt6.mp3" type="audio/mpeg">
    </audio>

    <div class="dedicatoria">
        <p>Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz <span id="meses-num">19</span> meses amorcito te amo demasiado y quiero cumplir muchos años más a tu lado mi niña hermosa ❤️</p>
    </div>

    <div class="contenido-central" id="escena">
        <img src="nuestra-foto.jpg" alt="Nosotros" class="nuestra-foto">
        <img src="arbol.png" alt="Árbol" class="arbol">
    </div>

    <div class="contador-texto" id="contador">19 meses</div>

    <script>
        function actualizarReloj() {
            const inicio = new Date('2024-08-03T00:00:00');
            const ahora = new Date();
            let meses = (ahora.getFullYear() - inicio.getFullYear()) * 12 + (ahora.getMonth() - inicio.getMonth());
            if (ahora.getDate() < inicio.getDate()) meses--;
            document.getElementById('contador').innerText = `${meses} meses`;
            document.getElementById('meses-num').innerText = meses;
        }
        actualizarReloj();

        const audio = document.getElementById('miAudio');
        const boton = document.getElementById('boton-musica');
        function toggleMusica() {
            if (audio.paused) { audio.play(); boton.innerHTML = '⏸️'; }
            else { audio.pause(); boton.innerHTML = '🎵'; }
        }

        function crearCorazon() {
            const escena = document.getElementById('escena');
            const corazon = document.createElement('div');
            corazon.classList.add('corazon');
            corazon.innerHTML = '❤️';
            const x = Math.random() * 220 - 110; 
            corazon.style.left = `calc(50% + ${x}px)`;
            corazon.style.top = `${Math.random() * 100 + 100}px`;
            escena.appendChild(corazon);
            setTimeout(() => corazon.remove(), 5000);
        }

        function crearEstrella() {
            const estrella = document.createElement('div');
            estrella.classList.add('estrella');
            const size = Math.random() * 3 + 1 + 'px';
            estrella.style.width = size;
            estrella.style.height = size;
            estrella.style.left = Math.random() * 100 + 'vw';
            estrella.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(estrella);
            setTimeout(() => estrella.remove(), 4000);
        }

        setInterval(crearCorazon, 450);
        setInterval(crearEstrella, 300);
    </script>
</body>
</html>
