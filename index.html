<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro 19 meses ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        .texto-superior {
            width: 85%;
            margin-top: 30px;
            text-align: center;
            min-height: 80px;
            z-index: 10;
        }

        .texto-superior p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            color: #333;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* --- SISTEMA DE LA PLANTA (ESTILO YOUTUBE) --- */
        .container-planta {
            position: relative;
            width: 200px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* El Tallo que sube */
        .tallo {
            width: 8px;
            height: 0;
            background: linear-gradient(to top, #2d6a4f, #52b788);
            border-radius: 10px;
            position: absolute;
            bottom: 0;
            animation: crecerTallo 2s ease-out forwards;
            box-shadow: 0 0 15px rgba(82, 183, 136, 0.5);
        }

        @keyframes crecerTallo {
            to { height: 220px; }
        }

        /* Hojas que se abren como en el video */
        .hoja {
            position: absolute;
            width: 45px;
            height: 25px;
            background: #74c69d;
            border-radius: 50% 0 50% 0;
            opacity: 0;
            transform: scale(0);
            animation: brotar 1.2s ease-out forwards;
        }

        .hoja.izq { left: -40px; transform: rotate(-35deg); border-radius: 0 50% 0 50%; }
        .hoja.der { right: -40px; transform: rotate(35deg); }

        @keyframes brotar {
            to { opacity: 1; transform: scale(1); }
        }

        /* La Flor que brilla (Corazón) */
        .flor-corazon {
            position: absolute;
            top: -35px;
            left: -20px;
            font-size: 45px;
            filter: drop-shadow(0 0 15px #ff4d6d);
            opacity: 0;
            transform: scale(0) translateY(20px);
            animation: florecer 1.5s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards;
        }

        @keyframes florecer {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Partículas de brillo (Luces del video) */
        .brillo {
            position: absolute;
            color: #fff3b0;
            font-size: 12px;
            pointer-events: none;
            animation: subirBrillo 4s linear infinite;
        }

        @keyframes subirBrillo {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-150px) translateX(30px); opacity: 0; }
        }

        /* --- FOTO Y CONTADOR --- */
        .nuestra-foto {
            width: 140px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: absolute;
            left: 5%;
            bottom: 15%;
            opacity: 0;
            transform: rotate(-5deg) translateY(30px);
            transition: all 1.2s ease-out;
        }

        .contador {
            font-size: 3.5rem;
            color: #ff4d6d;
            font-weight: 800;
            margin-bottom: 40px;
            opacity: 0;
            transition: opacity 2s;
        }
    </style>
</head>
<body>

    <div class="texto-superior">
        <p id="maquina"></p>
    </div>

    <div class="container-planta" id="garden">
        <div class="tallo">
            <div class="hoja izq" style="bottom: 40px; animation-delay: 0.6s;"></div>
            <div class="hoja der" style="bottom: 75px; animation-delay: 1s;"></div>
            <div class="hoja izq" style="bottom: 110px; animation-delay: 1.4s;"></div>
            <div class="hoja der" style="bottom: 145px; animation-delay: 1.8s;"></div>
            
            <div class="flor-corazon" style="animation-delay: 2.2s;">❤️</div>
        </div>
    </div>

    <img src="nuestra-foto.jpg" alt="Amor" class="nuestra-foto" id="foto">

    <div class="contador" id="meses">19 meses</div>

    <script>
        const frase = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito te amo demasiado ❤️";
        let n = 0;

        function escribir() {
            if (n < frase.length) {
                document.getElementById('maquina').innerHTML += frase.charAt(n);
                n++;
                setTimeout(escribir, 55);
            } else {
                document.getElementById('foto').style.opacity = "1";
                document.getElementById('foto').style.transform = "rotate(-5deg) translateY(0)";
                document.getElementById('meses').style.opacity = "1";
            }
        }

        function crearBrillo() {
            const b = document.createElement('div');
            b.className = 'brillo';
            b.innerHTML = '✨';
            b.style.left = Math.random() * 100 + '%';
            b.style.bottom = '20%';
            document.getElementById('garden').appendChild(b);
            setTimeout(() => b.remove(), 4000);
        }

        window.onload = () => {
            escribir();
            setInterval(crearBrillo, 600);
        };
    </script>
</body>
</html>
