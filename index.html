<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversario ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Tu imagen de flores de fondo */
            background: url('1000076521.png') no-repeat center top;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        /* Bloque de texto superior */
        .texto-superior {
            width: 85%;
            margin-top: 40px;
            text-align: center;
            z-index: 10;
        }

        .texto-superior p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #4a4a4a;
            line-height: 1.4;
            margin: 0;
        }

        /* Contenedor para Foto y Árbol (medio) */
        .seccion-media {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            width: 100%;
            flex-grow: 1;
            padding-bottom: 20px;
            position: relative;
        }

        .nuestra-foto {
            width: 150px;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            border: 6px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 5;
        }

        .arbol-container {
            position: relative;
            width: 180px;
            height: 200px;
        }

        .arbol-img {
            width: 100%;
            z-index: 2;
            position: relative;
        }

        /* Contador inferior */
        .contador-abajo {
            font-size: 3.5rem;
            color: #ff4d6d;
            font-weight: 800;
            margin-bottom: 50px;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(255,255,255,0.8);
        }

        /* Corazones saliendo del árbol */
        .corazon {
            position: absolute;
            color: #ff758f;
            z-index: 1;
            animation: brotar 4s ease-out forwards;
            pointer-events: none;
        }

        @keyframes brotar {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-180px) translateX(var(--random-x)) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="texto-superior">
        <p>Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz <span id="meses-texto">19</span> meses amorcito te amo demasiado y quiero cumplir muchos años más a tu lado mi niña hermosa ❤️</p>
    </div>

    <div class="seccion-media">
        <img src="nuestra-foto.jpg" alt="Nosotros" class="nuestra-foto">
        
        <div class="arbol-container" id="contenedor-arbol">
            <img src="arbol.png" alt="Árbol" class="arbol-img">
        </div>
    </div>

    <div class="contador-abajo" id="contador-principal">19 meses</div>

    <script>
        function actualizarTiempo() {
            const inicio = new Date('2024-08-03T00:00:00');
