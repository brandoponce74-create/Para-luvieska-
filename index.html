<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aniversario</title>

<style>
body{
    margin:0;
    width:100vw;
    height:100vh;
    background: black url("1000076521.png") no-repeat center center fixed;
    background-size: cover;
    overflow:hidden;
}

/* CONTENEDOR GENERAL */
.scene{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    height:500px;
}

/* ÁRBOL */
.tree{
    position:absolute;
    bottom:0;
    width:100%;
}

/* FOTO */
.photo{
    position:absolute;
    bottom:200px;
    left:50%;
    transform:translateX(-50%);
    width:130px;
    border-radius:12px;
    z-index:10;
}

/* CORAZONES */
.heart{
    position:absolute;
    animation: grow 6s linear forwards;
    pointer-events:none;
}

@keyframes grow{
    0%{opacity:0; transform:scale(0);}
    20%{opacity:1; transform:scale(1.2);}
    100%{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<div class="scene" id="treeArea">
    <img src="arbol.png" class="tree">
    <img src="nuestra-foto.jpg" class="photo">
</div>

<script>
function createHeart(){
    const area=document.getElementById("treeArea");
    const heart=document.createElement("div");
    heart.className="heart";
    heart.textContent="❤";

    const colors=["#ff4d6d","#ff758f","#c9184a","#ffb3c1"];
    heart.style.color=colors[Math.floor(Math.random()*colors.length)];

    const x=(Math.random()-0.5)*200;
    const y=Math.random()*150+200;

    heart.style.left="50%";
    heart.style.bottom=y+"px";
    heart.style.transform=`translateX(${x}px)`;
    heart.style.fontSize=(Math.random()*12+14)+"px";

    area.appendChild(heart);
}
setInterval(createHeart,120);
</script>

</body>
</html>
