<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amor ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        /* Texto con escritura */
        .texto-superior {
            width: 85%;
            margin-top: 30px;
            text-align: center;
            min-height: 100px;
            z-index: 10;
        }

        .texto-superior p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            color: #333;
            line-height: 1.3;
        }

        .seccion-media {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            position: relative;
        }

        /* La foto aparece al final */
        .nuestra-foto {
            width: 140px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transform: scale(0.5);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* CONTENEDOR DEL ÁRBOL SVG */
        .arbol-svg-container {
            width: 250px;
            height: 300px;
            position: relative;
        }

        /* Estilo para las ramas del árbol */
        .rama {
            fill: none;
            stroke: #5d4037;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: crecerRama 4s ease-out forwards;
        }

        @keyframes crecerRama {
            to { stroke-dashoffset: 0; }
        }

        /* Hojas/Corazones cayendo */
        .hoja-corazon {
            position: absolute;
            color: #ff4d6d;
            font-size: 15px;
            pointer-events: none;
            opacity: 0;
            animation: caer 5s linear forwards;
        }

        @keyframes caer {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(300px) rotate(360deg) translateX(var(--x)); opacity: 0; }
        }

        .contador-pie {
            font-size: 3rem;
            color: #ff4d6d;
            font-weight: 800;
            margin-bottom: 40px;
            opacity: 0;
            transition: opacity 2s;
        }
    </style>
</head>
<body>

    <div class="texto-superior">
        <p id="typed"></p>
    </div>

    <div class="seccion-media">
        <img src="nuestra-foto.jpg" alt="Amor" class="nuestra-foto" id="foto-amor">
        
        <div class="arbol-svg-container" id="arbol-box">
            <svg viewBox="0 0 200 200" width="100%" height="100%">
                <path class="rama" d="M100,200 L100,140" style="stroke-width: 8;"/>
                <path class="rama" d="M100,160 Q70,140 60,110" animation-delay="1s"/>
                <path class="rama" d="M80,130 Q50,110 40,80" animation-delay="1.5s"/>
                <path class="rama" d="M100,160 Q130,140 140,110" animation-delay="1.2s"/>
                <path class="rama" d="M120,130 Q150,110 160,80" animation-delay="1.8s"/>
                <path class="rama" d="M100,140 Q100,100 100,60" animation-delay="0.5s"/>
            </svg>
            <div id="hojas-layer"></div>
        </div>
    </div>

    <div class="contador-pie" id="meses-display">19 meses</div>

    <script>
        const texto = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito te amo demasiado y quiero cumplir muchos años más a tu lado mi niña hermosa ❤️";
        let charIndex = 0;

        function typeWriter() {
            if (charIndex < texto.length) {
                document.getElementById("typed").innerHTML += texto.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 55);
            } else {
                // Aparece la foto y el contador
                document.getElementById('foto-amor').style.opacity = "1";
                document.getElementById('foto-amor').style.transform = "scale(1) rotate(-5deg)";
                document.getElementById('meses-display').style.opacity = "1";
            }
        }

        function crearHoja() {
            const layer = document.getElementById('hojas-layer');
            const corazon = document.createElement('div');
            corazon.className = 'hoja-corazon';
            corazon.innerHTML = Math.random() > 0.3 ? '❤️' : '🌸';
            
            // Posición arriba del árbol
            corazon.style.left = Math.random() * 200 + 'px';
            corazon.style.top = '50px';
            corazon.style.setProperty('--x', (Math.random() * 100 - 50) + 'px');
            
            layer.appendChild(corazon);
            setTimeout(() => corazon.remove(), 5000);
        }

        window.onload = () => {
            typeWriter();
            // Los corazones empiezan a caer después de que el árbol crece
            setTimeout(() => {
                setInterval(crearHoja, 400);
            }, 2000);
        };
    </script>
</body>
</html>
