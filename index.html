<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña hermosa ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        .texto-superior {
            width: 90%;
            margin-top: 20px;
            text-align: center;
            min-height: 100px;
            z-index: 100;
        }

        .texto-superior p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            color: #333;
            line-height: 1.2;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        canvas {
            display: block;
        }

        .nuestra-foto {
            width: 130px;
            height: 170px;
            object-fit: cover;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: absolute;
            left: 5%;
            bottom: 20%;
            opacity: 0;
            transform: scale(0.5) rotate(-10deg);
            transition: all 1.5s ease-in-out;
        }

        .corazon-volando {
            position: absolute;
            color: #ff4d6d;
            font-size: 14px;
            pointer-events: none;
            animation: caer 5s linear forwards;
        }

        @keyframes caer {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(500px) rotate(360deg) translateX(var(--rx)); opacity: 0; }
        }

        .contador-pie {
            font-size: 3.2rem;
            color: #ff4d6d;
            font-weight: 800;
            margin-bottom: 30px;
            opacity: 0;
            transition: opacity 2s;
        }
    </style>
</head>
<body>

    <div class="texto-superior">
        <p id="escritura"></p>
    </div>

    <div id="canvas-container">
        <img src="nuestra-foto.jpg" alt="Amor" class="nuestra-foto" id="mifoto">
        <canvas id="treeCanvas"></canvas>
    </div>

    <div class="contador-pie" id="meses_txt">19 meses</div>

    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = 400;

        const frase = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito te amo demasiado y quiero cumplir muchos años más a tu lado mi niña hermosa ❤️";
        let i = 0;

        // 1. Escritura automática
        function escribirTexto() {
            if (i < frase.length) {
                document.getElementById("escritura").innerHTML += frase.charAt(i);
                i++;
                setTimeout(escribirTexto, 40);
            } else {
                document.getElementById('mifoto').style.opacity = "1";
                document.getElementById('mifoto').style.transform = "scale(1) rotate(-6deg)";
                document.getElementById('meses_txt').style.opacity = "1";
            }
        }

        // 2. Función para dibujar el árbol con MUCHAS ramas
        function drawBranch(x, y, len, angle, width) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = "#4e342e";
            ctx.lineWidth = width;
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            if (len < 10) {
                // Dibuja la hoja (corazón)
                ctx.fillStyle = "#ff4d6d";
                ctx.font = "12px Arial";
                ctx.fillText("❤️", -6, -len);
                ctx.restore();
                return;
            }

            // Aquí está la ramificación: crea 3 ramas por cada una
            setTimeout(() => {
                drawBranch(0, -len, len * 0.8, angle - 25, width * 0.7);
                drawBranch(0, -len, len * 0.8, angle + 25, width * 0.7);
                drawBranch(0, -len, len * 0.6, angle + 2, width * 0.7);
            }, 50);

            ctx.restore();
        }

        // 3. Corazones que caen
        function lluvia() {
            const container = document.getElementById('canvas-container');
            const c = document.createElement('div');
            c.className = 'corazon-volando';
            c.innerHTML = '❤️';
            c.style.left = Math.random() * 100 + '%';
            c.style.top = '0px';
            c.style.setProperty('--rx', (Math.random() * 200 - 100) + 'px');
            container.appendChild(c);
            setTimeout(() => c.remove(), 5000);
        }

        window.onload = () => {
            escribirTexto();
            // Inicia el árbol en el centro del canvas
            drawBranch(canvas.width / 2, canvas.height, 70, 0, 7);
            setInterval(lluvia, 400);
        };
    </script>
</body>
</html>
