<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña hermosa</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; font-family: 'Quicksand', sans-serif; overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed; 
            background-size: cover;
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); z-index: 0;
        }

        .card { 
            text-align: center; width: 95%; max-width: 450px; z-index: 10; 
            background: rgba(255, 255, 255, 0.92); padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        
        #message-area { 
            font-family: 'Dancing Script', cursive; font-size: 1.5rem; 
            color: #4a332d; min-height: 90px; margin-bottom: 10px;
        }

        .visual-container { 
            position: relative; display: flex; justify-content: center; 
            align-items: flex-end; gap: 10px; height: 260px; 
        }

        .photo-side { 
            width: 110px; height: 155px; 
            background: url('nuestra-foto.jpg') center/cover;
            border-radius: 12px; border: 4px solid white;
        }
        
        .tree-wrapper { 
            position: relative; width: 200px; height: 250px; 
            background: url('arbol-artístico.png') no-repeat bottom center/contain;
        }

        /* LÓGICA EXTRAÍDA DE TU IMAGEN: Posicionamiento absoluto y fijo */
        .heart-leaf {
            position: absolute; /* Como en tu imagen de referencia */
            pointer-events: none;
            opacity: 0;
            z-index: 15;
            animation: flower-appear 6s ease-out forwards;
        }

        @keyframes flower-appear {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; transform: scale(1.3) rotate(10deg); }
            /* Se queda FIJO en la rama (no sube como burbuja) */
            85% { opacity: 0.9; transform: scale(1) translate(var(--vx), var(--vy)); }
            100% { opacity: 0; transform: scale(0.2); }
        }

        #timer { font-weight: bold; font-size: 3rem; color: #ff4d6d; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="message-area"></div>
        <div class="visual-container">
            <div class="photo-side"></div>
            <div class="tree-wrapper" id="tree-target"></div>
        </div>
        <div id="timer">19 meses</div>
    </div>

    <script>
        const text = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito te amo demasiado ❤️";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("message-area").innerHTML += text.charAt(i);
                i++; setTimeout(type, 60);
            }
        }

        function createLeaf() {
            const tree = document.getElementById('tree-target');
            const leaf = document.createElement('div');
            leaf.classList.add('heart-leaf');
            leaf.innerHTML = '❤';
            
            // PALETA DE COLORES DEL VIDEO
            const colors = ['#ff4d6d', '#ff758f', '#c9184a', '#ff8fa3', '#800f2f', '#fb6f92'];
            leaf.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            // POSICIÓN FIJA EN LAS RAMAS (Lógica de tu imagen)
            const x = (Math.random() - 0.5) * 175; 
            const y = Math.random() * 115 + 105; 
            
            leaf.style.left = `calc(50% + ${x}px)`;
            leaf.style.bottom = `${y}px`;
            
            // Vibración sutil para que parezcan hojas vivas
            leaf.style.setProperty('--vx', (Math.random() * 5 - 2.5) + 'px');
            leaf.style.setProperty('--vy', (Math.random() * 5 - 2.5) + 'px');
            leaf.style.fontSize = (Math.random() * 8 + 13) + 'px';

            tree.appendChild(leaf);
            setTimeout(() => leaf.remove(), 6000);
        }

        type(); 
        setInterval(createLeaf, 110); // Genera más rápido para que el árbol se vea lleno
    </script>
</body>
</html>
