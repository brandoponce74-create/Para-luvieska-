<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversario ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        .texto-superior {
            width: 90%;
            margin-top: 20px;
            text-align: center;
            min-height: 100px;
            z-index: 100;
        }

        .texto-superior p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            color: #333;
            line-height: 1.2;
        }

        .contenedor-central {
            position: relative;
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        canvas {
            display: block;
            z-index: 5;
        }

        .nuestra-foto {
            width: 130px;
            height: 170px;
            object-fit: cover;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: absolute;
            left: 5%;
            bottom: 50px;
            opacity: 0;
            transform: scale(0.5) rotate(-10deg);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }

        .hoja-caida {
            position: absolute;
            color: #ff4d6d;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            animation: caer 6s linear forwards;
        }

        @keyframes caer {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(500px) rotate(360deg) translateX(var(--rx)); opacity: 0; }
        }

        .contador-pie {
            font-size: 3.5rem;
            color: #ff4d6d;
            font-weight: 800;
            margin-bottom: 30px;
            opacity: 0;
            transition: opacity 2s;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="texto-superior">
        <p id="typewriter"></p>
    </div>

    <div class="contenedor-central">
        <img src="nuestra-foto.jpg" alt="Amor" class="nuestra-foto" id="foto">
        <canvas id="treeCanvas"></canvas>
    </div>

    <div class="contador-pie" id="meses">19 meses</div>

    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 450;

        const frase = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito te amo demasiado y quiero cumplir muchos años más a tu lado mi niña hermosa ❤️";
        let charIdx = 0;

        // 1. Efecto Escritura
        function escribir() {
            if (charIdx < frase.length) {
                document.getElementById("typewriter").innerHTML += frase.charAt(charIdx);
                charIdx++;
                setTimeout(escribir, 50);
            } else {
                document.getElementById('foto').style.opacity = "1";
                document.getElementById('foto').style.transform = "scale(1) rotate(-6deg)";
                document.getElementById('meses').style.opacity = "1";
            }
        }

        // 2. Función Fractal para Ramificar el Árbol
        function drawTree(startX, startY, len, angle, branchWidth) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = "#4e342e";
            ctx.lineWidth = branchWidth;
            ctx.translate(startX, startY);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            if (len < 15) {
                // Hojas de corazón al final de las ramas
                ctx.fillStyle = "#ff4d6d";
                ctx.font = "10px Arial";
                ctx.fillText("❤️", -5, -len);
                ctx.restore();
                return;
            }

            // Ramificar
            setTimeout(() => {
                drawTree(0, -len, len * 0.75, angle - 20, branchWidth * 0.7);
                drawTree(0, -len, len * 0.75, angle + 20, branchWidth * 0.7);
            }, 100);

            ctx.restore();
        }

        // 3. Lluvia de corazones
        function crearLluvia() {
            const contenedor = document.querySelector('.contenedor-central');
            const corazon = document.createElement('div');
            corazon.className = 'hoja-caida';
            corazon.innerHTML = '❤️';
            corazon.style.left = (Math.random() * 80 + 10) + '%';
            corazon.style.top = '100px';
            corazon.style.setProperty('--rx', (Math.random() * 200 - 100) + 'px');
            contenedor.appendChild(corazon);
            setTimeout(() => corazon.remove(), 6000);
        }

        window.onload = () => {
            escribir();
            // Iniciar dibujo del árbol
            drawTree(200, 450, 80, 0, 8);
            
            // Iniciar lluvia
            setTimeout(() => {
                setInterval(crearLluvia, 400);
            }, 2000);
        };
    </script>
</body>
</html>
