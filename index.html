<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Luvieska</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --heart-red: #ff4d6d; 
            --text-color: #5d4037; 
            /* Fondo de la carta central */
            --card-bg: rgba(255, 240, 245, 0.9); 
        }
        
        body { 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; 
            
            /* APLICANDO TU IMAGEN DE FONDO */
            background-image: url('fondo-flores.png'); 
            background-size: cover; /* Cubre toda la pantalla */
            background-position: center; /* Centra la imagen */
            background-attachment: fixed; /* El fondo no se mueve al hacer scroll */
            
            font-family: 'Quicksand', sans-serif; 
            overflow: hidden; 
        }

        /* Estilos para la carta central */
        .card { 
            text-align: center; 
            width: 90%; 
            max-width: 480px; 
            padding: 25px;
            background-color: var(--card-bg); /* Fondo claro para legibilidad */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Sombra para resaltar */
            position: relative; 
            z-index: 10; 
        }
        
        #message-area { 
            font-family: 'Dancing Script', cursive; font-size: 1.5rem; 
            color: var(--text-color); min-height: 100px; margin-bottom: 20px;
            line-height: 1.3;
        }

        .duo-container { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-bottom: 20px; }
        
        .photo-side { 
            width: 130px; height: 175px; 
            background-image: url('nuestra-foto.jpg'); 
            background-size: cover; background-position: center;
            border-radius: 15px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .tree-side { 
            position: relative; width: 190px; height: 240px; 
            background-image: url('arbol-artístico.png'); 
            background-size: contain; background-repeat: no-repeat; background-position: bottom;
        }

        /* HOJAS: Corazones que aparecen en las ramas y se quedan */
        .heart-leaf {
            position: absolute; color: var(--heart-red);
            pointer-events: none; opacity: 0;
            animation: stay-leaf 5s ease-in-out forwards;
        }

        @keyframes stay-leaf {
            0% { transform: scale(0); opacity: 0; }
            20% { opacity: 0.9; transform: scale(1.2) translateY(-5px); }
            /* Se mantiene vibrando suavemente en la rama */
            80% { opacity: 0.8; transform: scale(1) translateY(-10px) translateX(var(--vx)); }
            100% { opacity: 0; transform: scale(0.5) translateY(-15px); }
        }

        #timer { font-weight: bold; font-size: 2.8rem; color: var(--heart-red); }
    </style>
</head>
<body>
    <div class="card">
        <div id="message-area"></div>
        <div class="duo-container">
            <div class="photo-side"></div>
            <div class="tree-side" id="tree-canopy"></div>
        </div>
        <div id="timer">19 meses</div>
    </div>

    <script>
        const text = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito te amo demasiado y quiero cumplir muchos años más a tu lado mi niña hermosa ❤️";
        let index = 0;
        function typeWriter() {
            if (index < text.length) {
                document.getElementById("message-area").innerHTML += text.charAt(index);
                index++; setTimeout(typeWriter, 60);
            }
        }

        function createLeaf() {
            const container = document.getElementById('tree-canopy');
            const leaf = document.createElement('div');
            leaf.classList.add('heart-leaf');
            leaf.innerHTML = '❤';
            
            // Aparecen aleatoriamente en la zona de las ramas
            const x = (Math.random() - 0.5) * 160; 
            const y = Math.random() * 90 + 110; 
            
            leaf.style.left = `calc(50% + ${x}px)`;
            leaf.style.bottom = `${y}px`;
            leaf.style.setProperty('--vx', (Math.random() * 10 - 5) + 'px');
            leaf.style.fontSize = (Math.random() * 10 + 12) + 'px';
            
            container.appendChild(leaf);
            setTimeout(() => leaf.remove(), 5000);
        }

        typeWriter();
        setInterval(createLeaf, 150);
    </script>
</body>
</html>
