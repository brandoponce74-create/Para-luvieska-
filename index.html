<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contador de Amor</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Arial', sans-serif;
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(0,0,0,0.3);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 1.8em;
      margin-bottom: 20px;
    }

    .time {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 2em;
      font-weight: bold;
    }

    .box {
      background: rgba(255,255,255,0.2);
      padding: 15px 25px;
      border-radius: 15px;
      min-width: 120px;
    }

    .label {
      display: block;
      font-size: 0.5em;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Hola mi niña hermosa y dulce pastelito luvi</h1>
  <div class="time">
    <div class="box">
      <span id="months">0</span>
      <span class="label">Meses</span>
    </div>
    <div class="box">
      <span id="days">0</span>
      <span class="label">Días</span>
    </div>
  </div>
</div>

<script>
  const startDate = new Date("2024-08-03");

  function updateCounter() {
    const now = new Date();

    let years = now.getFullYear() - startDate.getFullYear();
    let months = now.getMonth() - startDate.getMonth();
    let days = now.getDate() - startDate.getDate();

    if (days < 0) {
      months--;
      const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
      days += prevMonth;
    }

    if (months < 0) {
      years--;
      months += 12;
    }

    const totalMonths = years * 12 + months;

    document.getElementById("months").textContent = totalMonths;
    document.getElementById("days").textContent = days;
  }

  updateCounter();
  setInterval(updateCounter, 1000);
</script>

</body>
</html>
