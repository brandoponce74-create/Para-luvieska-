<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 Meses Juntos ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        .texto-superior {
            width: 85%;
            margin-top: 20px;
            text-align: center;
            min-height: 90px;
            z-index: 100;
        }

        .texto-superior p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #333;
            text-shadow: 0 0 10px white;
        }

        /* ÁRBOL */
        .tree-container {
            position: relative;
            width: 100%;
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .branch {
            fill: none;
            stroke: #4e342e;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: grow 4s ease-out forwards;
        }

        @keyframes grow { to { stroke-dashoffset: 0; } }

        /* CORAZONES DE COLORES */
        .leaf {
            position: absolute;
            opacity: 0;
            transform: scale(0);
            animation: pop 1s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards;
        }

        @keyframes pop { to { opacity: 1; transform: scale(1); } }

        /* FOTO */
        .nuestra-foto {
            width: 120px;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            border: 4px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            position: absolute;
            left: 5%;
            bottom: 15%;
            opacity: 0;
            transition: 1.5s;
        }

        /* CONTADOR REUBICADO */
        .contador-final {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 3.8rem;
            color: #ff4d6d;
            font-weight: 900;
            text-shadow: 2px 2px 10px white;
            opacity: 0;
            transition: 2s;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="texto-superior">
        <p id="writer"></p>
    </div>

    <div class="tree-container" id="tree-box">
        <svg viewBox="0 0 200 200" width="300" height="300">
            <path class="branch" d="M100,200 L100,120" style="stroke-width: 8;"/>
            <path class="branch" d="M100,130 Q60,110 30,70" style="animation-delay: 0.5s;"/>
            <path class="branch" d="M100,130 Q140,110 170,70" style="animation-delay: 0.8s;"/>
            <path class="branch" d="M100,120 Q100,60 100,20" style="animation-delay: 1.2s;"/>
        </svg>
        <div id="hearts-layer"></div>
    </div>

    <img src="nuestra-foto.jpg" alt="Amor" class="nuestra-foto" id="foto-amor">
    <div class="contador-final" id="meses-tag">19 meses</div>

    <script>
        const frase = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito te amo demasiado ❤️";
        let speed = 50;
        let char = 0;

        function type() {
            if (char < frase.length) {
                document.getElementById('writer').innerHTML += frase.charAt(char);
                char++;
                setTimeout(type, speed);
            } else {
                document.getElementById('foto-amor').style.opacity = "1";
                document.getElementById('meses-tag').style.opacity = "1";
            }
        }

        function createHearts() {
            const layer = document.getElementById('hearts-layer');
            const colors = ['#ff4d6d', '#ff758f', '#c9184a', '#ffb3c1', '#ffd60a', '#9d4edd'];
            
            for (let i = 0; i < 1500; i++) {
                const heart = document.createElement('div');
                heart.className = 'leaf';
                heart.innerHTML = '❤️';
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Distribución en forma de corazón grande
                const t = Math.random() * 2 * Math.PI;
                const r = Math.random() * 110;
                const x = window.innerWidth/2 + (16 * Math.pow(Math.sin(t), 3)) * (r/10);
                const y = 250 - (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * (r/10);
                
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                heart.style.fontSize = (Math.random() * 12 + 6) + 'px';
                heart.style.animationDelay = (2 + Math.random() * 4) + 's';
                
                layer.appendChild(heart);
            }
        }

        window.onload = () => {
            type();
            createHearts();
        };
    </script>
</body>
</html>
