<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Árbol de amor</title>

<style>
body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:black;
}

/* FLORES ARRIBA Y ABAJO */
.flores{
    position:fixed;
    width:100%;
    z-index:1;
}
.flores.top{ top:0; }
.flores.bottom{ bottom:0; }

/* CONTENEDOR CENTRAL */
.scene{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    z-index:2;
}

/* ÁRBOL */
.tree{
    position:absolute;
    bottom:0;
    width:300px;
}

/* FOTO */
.photo{
    position:absolute;
    bottom:180px;
    width:140px;
    border-radius:12px;
    z-index:5;
}

/* CORAZONES */
.heart-leaf{
    position:absolute;
    pointer-events:none;
    animation: appear 6s linear forwards;
}

@keyframes appear{
    0%{opacity:0; transform:scale(0);}
    20%{opacity:1; transform:scale(1.2);}
    100%{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<img src="1000076521.png" class="flores top">
<img src="1000076521.png" class="flores bottom">

<div class="scene" id="tree-target">
    <img src="arbol.png" class="tree">
    <img src="nuestra-foto.jpg" class="photo">
</div>

<script>
function createHeart(){
    const container = document.getElementById("tree-target");
    const heart = document.createElement("div");
    heart.className="heart-leaf";
    heart.textContent="❤";

    const colors=["#ff4d6d","#ff758f","#c9184a","#ffb3c1"];
    heart.style.color = colors[Math.floor(Math.random()*colors.length)];

    const x = (Math.random()-0.5)*200;
    const y = Math.random()*150+200;

    heart.style.left = `50%`;
    heart.style.bottom = y+"px";
    heart.style.transform = `translateX(${x}px)`;
    heart.style.fontSize = (Math.random()*12+14)+"px";

    container.appendChild(heart);
}
setInterval(createHeart,120);
</script>

</body>
</html>
