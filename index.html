<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amor ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@700&display=swap');

        :root {
            --color-pink: #ff4d6d;
            --speed: 2s;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        /* Texto superior estilo máquina de escribir */
        .texto-superior {
            width: 85%;
            margin-top: 30px;
            text-align: center;
            min-height: 80px;
            z-index: 10;
        }

        .texto-superior p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #333;
        }

        /* CONTENEDOR DE LA PLANTA (ESTILO YOUTUBE) */
        .flower-container {
            position: relative;
            width: 200px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        /* El tallo que crece hacia arriba */
        .stem {
            width: 6px;
            height: 0;
            background: linear-gradient(to top, #4e342e, #8d6e63);
            border-radius: 10px;
            position: absolute;
            bottom: 0;
            animation: growStem 2s ease-out forwards;
        }

        @keyframes growStem {
            to { height: 200px; }
        }

        /* Hojas que brotan lateralmente */
        .leaf {
            position: absolute;
            width: 40px;
            height: 20px;
            background: #ff758f;
            border-radius: 50% 0 50% 0;
            opacity: 0;
            transform: scale(0);
            animation: bloom 1s ease-out forwards;
        }

        .leaf.left { left: -35px; transform: rotate(-30deg); border-radius: 0 50% 0 50%; }
        .leaf.right { right: -35px; transform: rotate(30deg); }

        @keyframes bloom {
            to { opacity: 1; transform: scale(1); }
        }

        /* Flor brillante superior */
        .flower-head {
            position: absolute;
            top: -25px;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px var(--color-pink);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 25px;
            opacity: 0;
            animation: bloom 1.5s ease-out 2s forwards;
        }

        /* Foto de la pareja */
        .nuestra-foto {
            width: 120px;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
            border: 4px solid white;
            position: absolute;
            left: 5%;
            bottom: 15%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease-out;
        }

        /* Contador */
        .contador-abajo {
            font-size: 3rem;
            color: var(--color-pink);
            font-weight: 800;
            opacity: 0;
            transition: opacity 2s;
        }

        /* Corazones flotantes (partículas de luz del video) */
        .glow {
            position: absolute;
            color: gold;
            font-size: 10px;
            pointer-events: none;
            animation: fly 3s linear infinite;
        }

        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) translateX(20px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="texto-superior">
        <p id="typed"></p>
    </div>

    <div class="flower-container" id="flower-box">
        <div class="stem">
            <div class="leaf left" style="bottom: 50px; animation-delay: 0.5s;"></div>
            <div class="leaf right" style="bottom: 80px; animation-delay: 0.8s;"></div>
            <div class="leaf left" style="bottom: 120px; animation-delay: 1.2s;"></div>
            <div class="leaf right" style="bottom: 150px; animation-delay: 1.5s;"></div>
            <div class="flower-head">❤️</div>
        </div>
    </div>

    <img src="nuestra-foto.jpg" alt="Amor" class="nuestra-foto" id="foto">

    <div class="contador-abajo" id="count">19 meses</div>

    <script>
        const frase = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito ❤️";
        let idx = 0;

        function typing() {
            if (idx < frase.length) {
                document.getElementById('typed').innerHTML += frase.charAt(idx);
                idx++;
                setTimeout(typing, 60);
            } else {
                document.getElementById('foto').style.opacity = "1";
                document.getElementById('foto').style.transform = "translateY(0)";
                document.getElementById('count').style.opacity = "1";
            }
        }

        function createGlow() {
            const glow = document.createElement('div');
            glow.className = 'glow';
            glow.innerHTML = '✨';
            glow.style.left = Math.random() * 100 + '%';
            document.getElementById('flower-box').appendChild(glow);
            setTimeout(() => glow.remove(), 3000);
        }

        window.onload = () => {
            typing();
            setInterval(createGlow, 500);
        };
    </script>
</body>
</html>
