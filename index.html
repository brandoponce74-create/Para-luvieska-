<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña hermosa ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('1000076521.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        /* Contenedor del texto con efecto de escritura */
        .texto-superior {
            width: 85%;
            margin-top: 50px;
            text-align: center;
            min-height: 120px;
            z-index: 10;
        }

        .texto-superior p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #4a4a4a;
            line-height: 1.4;
            margin: 0;
            display: inline;
        }

        /* El cursor que parpadea mientras se escribe */
        .cursor {
            border-left: 3px solid #ff4d6d;
            margin-left: 5px;
            animation: parpadeo 0.7s infinite;
        }

        @keyframes parpadeo {
            50% { border-color: transparent; }
        }

        .seccion-media {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            width: 100%;
            flex-grow: 1;
            padding-bottom: 40px;
            position: relative;
        }

        /* La foto aparece después de un rato */
        .nuestra-foto {
            width: 160px;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            border: 6px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(30px) rotate(-5deg);
            transition: all 1.5s ease-out;
        }

        /* Efecto de formación del árbol */
        .arbol-container {
            position: relative;
            width: 250px;
            height: 280px;
            overflow: hidden;
        }

        .arbol-img {
            width: 100%;
            height: auto;
            /* Máscara que inicia vacía y se llena hacia arriba */
            clip-path: inset(100% 0 0 0); 
            animation: formarArbol 4s ease-in-out forwards;
        }

        @keyframes formarArbol {
            0% { clip-path: inset(100% 0 0 0); }
            100% { clip-path: inset(0% 0 0 0); }
        }

        /* Contador grande abajo */
        .contador-abajo {
            font-size: 3.5rem;
            color: #ff4d6d;
            font-weight: 800;
            margin-bottom: 60px;
            opacity: 0;
            transition: opacity 2s;
        }

        /* Corazones animados */
        .corazon {
            position: absolute;
            color: #ff758f;
            pointer-events: none;
            z-index: 1;
            animation: brotarCorazon 4s ease-out forwards;
        }

        @keyframes brotarCorazon {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { transform: translateY(-250px) translateX(var(--rx)) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="texto-superior">
        <p id="texto-escrito"></p><span class="cursor" id="cursor"></span>
    </div>

    <div class="seccion-media">
        <img src="nuestra-foto.jpg" alt="Nosotros" class="nuestra-foto" id="foto">
        
        <div class="arbol-container">
            <img src="1000076520.png" alt="Árbol" class="arbol-img">
            <div id="contenedor-corazones"></div>
        </div>
    </div>

    <div class="contador-abajo" id="contador">19 meses</div>

    <script>
        const frase = "Cuanto más tiempo paso a tu lado me enamoro más de ti, feliz 19 meses amorcito te amo demasiado y quiero cumplir muchos años más a tu lado mi niña hermosa ❤️";
        const contenedorTexto = document.getElementById('texto-escrito');
        const foto = document.getElementById('foto');
        const contador = document.getElementById('contador');
        let index = 0;

        // 1. Efecto de escribir letra por letra
        function escribir() {
            if (index < frase.length) {
                contenedorTexto.innerHTML += frase.charAt(index);
                index++;
                setTimeout(escribir, 60); // Velocidad de las letras
            } else {
                document.getElementById('cursor').style.display = 'none';
                // Al terminar el texto, mostramos la foto y el contador
                foto.style.opacity = "1";
                foto.style.transform = "translateY(0) rotate(-6deg)";
                contador.style.opacity = "1";
            }
        }

        // 2. Lógica para que broten corazones del árbol
        function crearCorazon() {
            const container = document.getElementById('contenedor-corazones');
            const corazon = document.createElement('div');
            corazon.classList.add('corazon');
            corazon.innerHTML = '❤️';
            
            // Posición aleatoria sobre las ramas del árbol
            corazon.style.left = Math.random() * 150 + 50 + 'px';
            corazon.style.bottom = '150px';
            corazon.style.setProperty('--rx', (Math.random() * 100 - 50) + 'px');
            corazon.style.fontSize = Math.random() * 20 + 15 + 'px';

            container.appendChild(corazon);
            setTimeout(() => corazon.remove(), 4000);
        }

        // Iniciar todo
        window.onload = () => {
            // El árbol empieza a crecer solo
            // El texto empieza a escribirse a los 1.5 segundos
            setTimeout(escribir, 1500);
            
            // Los corazones empiezan a salir cuando el árbol ya creció un poco
            setTimeout(() => {
                setInterval(crearCorazon, 350);
            }, 3000);
        };
    </script>
</body>
</html>
